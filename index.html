<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Snai3i Bank</title>
  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#172033;
      --muted:#6b7280;
      --line:#e5e7eb;
      --green:#e9f9ef;
      --green-border:#7bd69c;
      --green-strong:#1f9d55;
      --red:#fdecec;
      --red-border:#f39a9a;
      --red-strong:#e04b4b;
      --blue:#eef5ff;
      --shadow:0 10px 30px rgba(15,23,42,.07);
      --radius:18px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .app{
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    .topbar{
      background: linear-gradient(180deg, #0f172a, #111827);
      color:#fff;
      border-radius: 22px;
      padding: 18px 18px 14px;
      box-shadow: var(--shadow);
      position: sticky;
      top: 12px;
      z-index: 10;
      margin-bottom: 18px;
    }

    .topbar-row{
      display:flex;
      gap:12px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .brand h1{
      margin:0;
      font-size: 24px;
      line-height:1.1;
      letter-spacing:.2px;
    }

    .brand p{
      margin:0;
      color:#cbd5e1;
      font-size: 13px;
    }

    .group-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:flex-end;
    }

    .btn{
      border:0;
      border-radius:14px;
      padding:11px 14px;
      font-weight:700;
      cursor:pointer;
      transition:.15s ease;
      font-size:14px;
    }

    .btn:hover{ transform: translateY(-1px); }
    .btn:active{ transform: translateY(0); }

    .btn-add{
      background:#22c55e;
      color:#fff;
    }

    .group-pill{
      background:#1f2937;
      color:#e5e7eb;
      border:1px solid rgba(255,255,255,.08);
      padding:10px 14px;
      border-radius:14px;
      cursor:pointer;
      font-weight:700;
      white-space:nowrap;
    }

    .group-pill.active{
      background:#16a34a;
      color:#fff;
      box-shadow: 0 6px 18px rgba(22,163,74,.25);
    }

    .panel{
      background:var(--card);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow:hidden;
      border:1px solid rgba(229,231,235,.8);
    }

    .panel-head{
      padding: 22px 22px 16px;
      display:flex;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
      align-items:flex-end;
      border-bottom:1px solid var(--line);
    }

    .title-wrap h2{
      margin:0 0 6px;
      font-size: 32px;
      letter-spacing:-.4px;
    }

    .title-wrap .subtitle{
      margin:0;
      color:var(--muted);
      font-size:14px;
    }

    .stats{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .stat{
      background:#f8fafc;
      border:1px solid var(--line);
      padding:11px 14px;
      border-radius:14px;
      font-weight:700;
      color:#111827;
      font-size:14px;
    }

    .table-wrap{
      width:100%;
      overflow:auto;
    }

    table{
      width:100%;
      border-collapse:separate;
      border-spacing:0;
      min-width: 980px;
    }

    thead th{
      padding:16px 14px;
      text-align:left;
      font-size:15px;
      border-bottom:1px solid var(--line);
      background:#f9fafb;
      color:#111827;
      position:sticky;
      top:0;
      z-index:1;
    }

    th:nth-child(1), td:nth-child(1){
      width:64px;
      text-align:center;
    }

    th:nth-child(3), td:nth-child(3){
      width:130px;
      text-align:center;
    }

    th:nth-child(4), td:nth-child(4){
      width:180px;
      text-align:center;
    }

    th:nth-child(5), td:nth-child(5),
    th:nth-child(6), td:nth-child(6){
      width: 220px;
    }

    .head-add{
      background: rgba(34,197,94,.14);
      color: var(--green-strong);
    }

    .head-remove{
      background: rgba(239,68,68,.14);
      color: var(--red-strong);
    }

    tbody td{
      padding:14px;
      border-bottom:1px solid var(--line);
      vertical-align:middle;
      background:#fff;
    }

    tbody tr:hover td{
      background:#fafafa;
    }

    td.add-cell{
      background: linear-gradient(180deg, rgba(34,197,94,.08), rgba(34,197,94,.06));
    }

    td.remove-cell{
      background: linear-gradient(180deg, rgba(239,68,68,.08), rgba(239,68,68,.06));
    }

    .student-name{
      font-weight:700;
      font-size:15px;
    }

    .points{
      font-variant-numeric: tabular-nums;
      font-weight:700;
      font-size:15px;
    }

    .coins{
      display:flex;
      justify-content:center;
    }

    .coin-strip{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .coin{
      width:28px;
      height:28px;
      border-radius:999px;
      border:1px solid transparent;
      font-weight:800;
      font-size:12px;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:0;
      transition:.15s ease;
    }

    .coin:hover{ transform: translateY(-1px); }

    .coin-pending{
      background:#fff7d6;
      border-color:#f2c94c;
      color:#b7791f;
    }

    .coin-given{
      background:#dcfce7;
      border-color:#86efac;
      color:#15803d;
    }

    .muted{
      color:var(--muted);
      font-size:14px;
    }

    .point-input{
      width: 100%;
      min-width: 140px;
      border-radius: 14px;
      border:1px solid #cbd5e1;
      padding: 12px 14px;
      font-size: 15px;
      background:#fff;
      outline:none;
      transition:.15s ease;
      font-variant-numeric: tabular-nums;
    }

    .point-input:focus{
      box-shadow: 0 0 0 4px rgba(59,130,246,.14);
      border-color:#60a5fa;
    }

    .add-input{
      border-color: var(--green-border);
      background: rgba(255,255,255,.92);
    }

    .remove-input{
      border-color: var(--red-border);
      background: rgba(255,255,255,.92);
    }

    .add-footer{
      padding:18px 22px 22px;
      display:flex;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
      align-items:center;
      border-top:1px solid var(--line);
    }

    .helper{
      background:var(--blue);
      border:1px solid #cfe1ff;
      color:#1d4ed8;
      padding:12px 14px;
      border-radius:16px;
      font-size:14px;
      line-height:1.45;
    }

    .empty{
      padding: 36px 22px 42px;
      text-align:center;
      color: var(--muted);
    }

    .empty strong{
      display:block;
      color:var(--text);
      font-size:18px;
      margin-bottom:6px;
    }

    .small-btn{
      background:#111827;
      color:#fff;
    }

    @media (max-width: 760px){
      .app{ padding: 12px; }
      .topbar{ top: 8px; border-radius: 18px; }
      .panel-head h2{ font-size: 26px; }
      .brand h1{ font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-row">
        <div class="brand">
          <h1>Snai3i Bank</h1>
          <p>Simple points and coins tracker</p>
        </div>

        <div class="group-actions">
          <button class="btn btn-add" id="addGroupBtn">+ Add Group</button>
          <button class="btn small-btn" id="addStudentBtn">+ Add Student</button>
        </div>
      </div>

      <div id="groupsBar" class="group-actions" style="margin-top:14px; justify-content:flex-start;"></div>
    </header>

    <main class="panel">
      <section class="panel-head">
        <div class="title-wrap">
          <h2 id="groupTitle">Group</h2>
          <p class="subtitle" id="groupSubtitle">Choose a group</p>
        </div>
        <div class="stats">
          <div class="stat" id="studentCount">Students: 0</div>
          <div class="stat" id="groupCount">Groups: 0</div>
        </div>
      </section>

      <section class="table-wrap" id="tableWrap"></section>

      <section class="add-footer">
        <div class="helper">
          Type a number in the green column to add points, or in the red column to remove points. Press Enter or click outside the field to apply. Decimals like 0.25 and 0.5 work.
        </div>
      </section>
    </main>
  </div>

  <script>
    const STORAGE_KEY = "snai3i_bank_v1";

    const state = {
      groups: [],
      activeGroupId: null
    };

    function uid(prefix = "id") {
      return `${prefix}_${Math.random().toString(36).slice(2, 10)}_${Date.now().toString(36)}`;
    }

    function round2(n) {
      return Math.round((Number(n) + Number.EPSILON) * 100) / 100;
    }

    function formatPoints(n) {
      return round2(n).toFixed(2);
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        groups: state.groups,
        activeGroupId: state.activeGroupId
      }));
    }

    function syncCoins(student) {
      const coinCount = Math.floor((Number(student.points) || 0) / 10);
      if (!Array.isArray(student.coinsGiven)) student.coinsGiven = [];

      if (student.coinsGiven.length > coinCount) {
        student.coinsGiven = student.coinsGiven.slice(0, coinCount);
      }

      while (student.coinsGiven.length < coinCount) {
        student.coinsGiven.push(false);
      }
    }

    function loadData() {
      const raw = localStorage.getItem(STORAGE_KEY);

      if (raw) {
        try {
          const parsed = JSON.parse(raw);
          state.groups = Array.isArray(parsed.groups) ? parsed.groups : [];
          state.activeGroupId = parsed.activeGroupId || null;
        } catch {
          state.groups = [];
          state.activeGroupId = null;
        }
      }

      if (!state.groups.length) {
        state.groups = [
          { id: uid("group"), name: "Group 1", students: [] }
        ];
        state.activeGroupId = state.groups[0].id;
        saveData();
      }

      if (!state.activeGroupId || !state.groups.some(g => g.id === state.activeGroupId)) {
        state.activeGroupId = state.groups[0].id;
      }

      for (const group of state.groups) {
        for (const student of group.students) {
          if (typeof student.points !== "number") student.points = Number(student.points) || 0;
          student.points = round2(student.points);
          syncCoins(student);
        }
      }

      saveData();
    }

    function getActiveGroup() {
      return state.groups.find(g => g.id === state.activeGroupId) || state.groups[0];
    }

    function render() {
      renderGroupsBar();
      renderHeader();
      renderTable();
      saveData();
    }

    function renderGroupsBar() {
      const bar = document.getElementById("groupsBar");
      bar.innerHTML = state.groups.map(group => `
        <button
          class="group-pill ${group.id === state.activeGroupId ? "active" : ""}"
          data-action="switch-group"
          data-group-id="${group.id}"
          title="${escapeHtml(group.name)}"
        >
          ${escapeHtml(group.name)}
        </button>
      `).join("");
    }

    function renderHeader() {
      const group = getActiveGroup();
      const title = document.getElementById("groupTitle");
      const subtitle = document.getElementById("groupSubtitle");
      const studentCount = document.getElementById("studentCount");
      const groupCount = document.getElementById("groupCount");

      title.textContent = group ? group.name : "No group";
      subtitle.textContent = group
        ? "Manage students' points in this group"
        : "Add a group to start";
      studentCount.textContent = `Students: ${group ? group.students.length : 0}`;
      groupCount.textContent = `Groups: ${state.groups.length}`;
    }

    function renderTable() {
      const wrap = document.getElementById("tableWrap");
      const group = getActiveGroup();

      if (!group) {
        wrap.innerHTML = `
          <div class="empty">
            <strong>No groups yet</strong>
            Click “Add Group” to start.
          </div>
        `;
        return;
      }

      if (!group.students.length) {
        wrap.innerHTML = `
          <div class="empty">
            <strong>No students in ${escapeHtml(group.name)}</strong>
            Click “Add Student” to add the first name.
          </div>
        `;
        return;
      }

      wrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Student Name</th>
              <th>Points</th>
              <th>Coins</th>
              <th class="head-add">+ Add</th>
              <th class="head-remove">- Remove</th>
            </tr>
          </thead>
          <tbody>
            ${group.students.map((student, index) => rowHtml(group.id, student, index)).join("")}
          </tbody>
        </table>
      `;
    }

    function rowHtml(groupId, student, index) {
      const coinsHtml = student.coinsGiven.length
        ? `<div class="coin-strip">
            ${student.coinsGiven.map((given, coinIndex) => `
              <button
                class="coin ${given ? "coin-given" : "coin-pending"}"
                data-action="toggle-coin"
                data-group-id="${groupId}"
                data-student-id="${student.id}"
                data-coin-index="${coinIndex}"
                title="${given ? "Given" : "Not given"}"
                type="button"
              >${coinIndex + 1}</button>
            `).join("")}
          </div>`
        : `<span class="muted">—</span>`;

      return `
        <tr>
          <td>${index + 1}</td>
          <td class="student-name">${escapeHtml(student.name)}</td>
          <td class="points">${formatPoints(student.points)}</td>
          <td class="coins">${coinsHtml}</td>
          <td class="add-cell">
            <input
              class="point-input add-input"
              type="number"
              inputmode="decimal"
              step="0.25"
              min="0"
              placeholder="0.25"
              data-action="point-input"
              data-mode="add"
              data-group-id="${groupId}"
              data-student-id="${student.id}"
            />
          </td>
          <td class="remove-cell">
            <input
              class="point-input remove-input"
              type="number"
              inputmode="decimal"
              step="0.25"
              min="0"
              placeholder="0.25"
              data-action="point-input"
              data-mode="remove"
              data-group-id="${groupId}"
              data-student-id="${student.id}"
            />
          </td>
        </tr>
      `;
    }

    function switchGroup(groupId) {
      state.activeGroupId = groupId;
      render();
    }

    function addGroup() {
      const defaultName = `Group ${state.groups.length + 1}`;
      const name = prompt("Group name:", defaultName);
      if (name === null) return;

      const trimmed = name.trim();
      if (!trimmed) return;

      const newGroup = {
        id: uid("group"),
        name: trimmed,
        students: []
      };

      state.groups.push(newGroup);
      state.activeGroupId = newGroup.id;
      render();
    }

    function addStudent() {
      const group = getActiveGroup();
      if (!group) return;

      const name = prompt("Student name:");
      if (name === null) return;

      const trimmed = name.trim();
      if (!trimmed) return;

      const startPointsRaw = prompt("Starting points:", "0");
      if (startPointsRaw === null) return;

      const startPoints = round2(Math.max(0, Number(startPointsRaw) || 0));

      const student = {
        id: uid("student"),
        name: trimmed,
        points: startPoints,
        coinsGiven: []
      };

      syncCoins(student);
      group.students.push(student);
      render();
    }

    function findStudent(groupId, studentId) {
      const group = state.groups.find(g => g.id === groupId);
      if (!group) return null;
      const student = group.students.find(s => s.id === studentId);
      if (!student) return null;
      return { group, student };
    }

    function adjustPoints(groupId, studentId, mode, amount) {
      const target = findStudent(groupId, studentId);
      if (!target) return;

      const value = Number(amount);
      if (!Number.isFinite(value) || value <= 0) return;

      const delta = mode === "add" ? value : -value;
      target.student.points = round2(Math.max(0, target.student.points + delta));
      syncCoins(target.student);
      render();
    }

    function toggleCoin(groupId, studentId, coinIndex) {
      const target = findStudent(groupId, studentId);
      if (!target) return;

      const index = Number(coinIndex);
      if (!Number.isInteger(index)) return;
      if (index < 0 || index >= target.student.coinsGiven.length) return;

      target.student.coinsGiven[index] = !target.student.coinsGiven[index];
      render();
    }

    function applyInput(input) {
      const groupId = input.dataset.groupId;
      const studentId = input.dataset.studentId;
      const mode = input.dataset.mode;
      const value = input.value.trim();

      if (!value) return;

      adjustPoints(groupId, studentId, mode, value);
      input.value = "";
    }

    document.addEventListener("click", (event) => {
      const actionEl = event.target.closest("[data-action]");
      if (!actionEl) return;

      const action = actionEl.dataset.action;

      if (action === "switch-group") {
        switchGroup(actionEl.dataset.groupId);
      }

      if (action === "toggle-coin") {
        toggleCoin(
          actionEl.dataset.groupId,
          actionEl.dataset.studentId,
          actionEl.dataset.coinIndex
        );
      }
    });

    document.addEventListener("keydown", (event) => {
      if (!event.target.classList.contains("point-input")) return;
      if (event.key === "Enter") {
        event.preventDefault();
        applyInput(event.target);
        event.target.blur();
      }
    });

    document.addEventListener("focusout", (event) => {
      if (!event.target.classList.contains("point-input")) return;
      applyInput(event.target);
    }, true);

    document.getElementById("addGroupBtn").addEventListener("click", addGroup);
    document.getElementById("addStudentBtn").addEventListener("click", addStudent);

    loadData();
    render();
  </script>
</body>
</html>
