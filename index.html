<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Snai3i Bank</title>
<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }
button { margin:5px; padding:8px 12px; cursor:pointer; }
.add { background:#d4f8d4; }
.remove { background:#f8d4d4; }
table { width:100%; background:#fff; border-collapse:collapse; margin-top:20px; }
td,th { padding:10px; border:1px solid #ddd; text-align:center; }
input { width:70px; padding:5px; }
</style>
</head>

<body>

<h2>Snai3i Bank</h2>

<button onclick="addGroup()">+ Add Group</button>
<button onclick="deleteGroup()">🗑 Delete Group</button>
<button onclick="addStudent()">+ Add Student</button>
<button onclick="exportData()">⬇ Export</button>
<button onclick="importData()">⬆ Import</button>

<div id="groups"></div>
<div id="table"></div>

<script>
let data = JSON.parse(localStorage.getItem("bank")) || {
  groups: [{name:"Group 1", students:[]}],
  current:0
};

function save(){
  localStorage.setItem("bank", JSON.stringify(data));
}

function render(){
  // groups
  let ghtml="";
  data.groups.forEach((g,i)=>{
    ghtml += `<button onclick="switchGroup(${i})">${g.name}</button>`;
  });
  document.getElementById("groups").innerHTML = ghtml;

  let group = data.groups[data.current];

  let html = `
  <table>
  <tr>
    <th>Name</th>
    <th>Points</th>
    <th>Coins</th>
    <th class="add">+</th>
    <th class="remove">-</th>
  </tr>`;

  group.students.forEach((s,i)=>{
    let coins = Math.floor(s.points/10);

    html += `
    <tr>
      <td>${s.name}</td>
      <td>${s.points}</td>
      <td>${coins}</td>
      <td class="add">
        <input type="number" step="0.25"
        onchange="addPoint(${i}, this.value); this.value=''">
      </td>
      <td class="remove">
        <input type="number" step="0.25"
        onchange="removePoint(${i}, this.value); this.value=''">
      </td>
    </tr>`;
  });

  html += "</table>";
  document.getElementById("table").innerHTML = html;

  save();
}

function switchGroup(i){
  data.current = i;
  render();
}

function addGroup(){
  let name = prompt("Group name:");
  if(!name) return;
  data.groups.push({name, students:[]});
  data.current = data.groups.length-1;
  render();
}

function deleteGroup(){
  if(data.groups.length === 1){
    alert("You must keep at least one group");
    return;
  }
  if(confirm("Delete this group?")){
    data.groups.splice(data.current,1);
    data.current = 0;
    render();
  }
}

function addStudent(){
  let name = prompt("Student name:");
  if(!name) return;
  data.groups[data.current].students.push({name, points:0});
  render();
}

function addPoint(i,val){
  val = parseFloat(val);
  if(!val) return;
  data.groups[data.current].students[i].points += val;
  render();
}

function removePoint(i,val){
  val = parseFloat(val);
  if(!val) return;
  let s = data.groups[data.current].students[i];
  s.points = Math.max(0, s.points - val);
  render();
}

function exportData(){
  let file = new Blob([JSON.stringify(data)], {type:"application/json"});
  let a = document.createElement("a");
  a.href = URL.createObjectURL(file);
  a.download = "snai3i-backup.json";
  a.click();
}

function importData(){
  let input = document.createElement("input");
  input.type = "file";
  input.onchange = e => {
    let file = e.target.files[0];
    let reader = new FileReader();
    reader.onload = () => {
      data = JSON.parse(reader.result);
      render();
    };
    reader.readAsText(file);
  };
  input.click();
}

render();
</script>

</body>
</html>
